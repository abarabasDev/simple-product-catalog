<div class="container mt-4">
  <div class="card p-4 shadow">

    <form [formGroup]="newProductForm" (ngSubmit)="submitForm()">

      <div class="mb-3">
        <label class="form-label">Nazwa</label>
        <input type="text" class="form-control" formControlName="name">
        <form-validation-message [control]="newProductForm.controls.name"></form-validation-message>
      </div>

      <div class="mb-3">
        <label class="form-label">Kod producenta</label>
        <input type="text" class="form-control" formControlName="manufacturerCode">
        <form-validation-message [control]="newProductForm.controls.manufacturerCode"></form-validation-message>
      </div>

      <div class="row mb-3">
        <div class="col">
          <label class="form-label">Cena</label>
          <input type="number" step="0.01" min="0.01" class="form-control" formControlName="price" >
          <form-validation-message [control]="newProductForm.controls.price"></form-validation-message>
        </div>

        <div class="col">
          <label class="form-label">Ilość</label>
          <input type="number" min="1" class="form-control" formControlName="quantity">
          <form-validation-message [control]="newProductForm.controls.quantity"></form-validation-message>
        </div>         
      </div>

      <div class="d-flex justify-content-between">
        <a routerLink="/" class="btn btn-danger">Anuluj</a>
        <button type="submit" class="btn btn-success" [disabled]="newProductForm.invalid">Zapisz</button>
      </div>
      
    </form>

  </div>
</div>
